# =============================================================================
# CircleCI — Drupal on Pantheon   (Kanopi orbs)
# =============================================================================
# Shipped by kanopi/composer-assets-drupal-pantheon. The per-project values live in
# .circleci/env.sh (sourced by the `load-env` command below and by the deploy
# script). The only compile-time knobs are the PHP/Node versions, exposed as
# pipeline parameters because CircleCI resolves docker images before any file
# can be sourced. Secrets (TERMINUS_TOKEN, GITHUB_TOKEN, DOCKERHUB_*, SLACK_*)
# come from the `kanopi-code` context.
#
# To push a fix to every site: edit this file (or bump the orb versions) and
# `composer update kanopi/composer-assets-drupal-pantheon`. A site that must diverge sets
# `".circleci/config.yml": false` in its own composer.json and commits its copy.
# =============================================================================
version: 2.1

parameters:
  php_version:   { type: string, default: "8.3" }   # cimg/php tag; keep in sync with pantheon.yml
  node_version:  { type: string, default: "20.11.0" }  # keep in sync with theme .nvmrc
  cron_env:      { type: string, default: "live" }
  # Optional post-deploy stages. Flip a default to false to skip that job for
  # this site (these are jobs, so they cannot be toggled from env.sh — CircleCI
  # resolves the workflow before env.sh is sourced). Theme build is toggled
  # separately via BUILD_THEME in .circleci/env.sh.
  run_cypress:    { type: boolean, default: true }
  run_lighthouse: { type: boolean, default: true }
  run_pa11y:      { type: boolean, default: true }
  run_sdtt:       { type: boolean, default: true }
  run_backstop:   { type: boolean, default: true }

orbs:
  ci-tools:    kanopi/ci-tools@2
  cms-updates: kanopi/cms-updates@2
  slack:       circleci/slack@3.4.2
  node:        circleci/node@5.0.3

commands:
  load-env:
    description: "Make .circleci/env.sh values available to all later steps."
    steps:
      - run:
          name: Load project env
          command: cat .circleci/env.sh >> "$BASH_ENV"
  gate:
    description: "End the job early (as success) unless the given toggle is true."
    parameters:
      enabled: { type: boolean }
    steps:
      - unless:
          condition: << parameters.enabled >>
          steps:
            - run:
                name: Stage disabled via pipeline parameter — skipping
                command: circleci-agent step halt

executors:
  php:
    docker:
      - image: cimg/php:<< pipeline.parameters.php_version >>
    working_directory: ~/project
  buildtools:
    docker:
      - image: quay.io/pantheon-public/build-tools-ci:8.x-php<< pipeline.parameters.php_version >>
    working_directory: ~/project
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
      TERM: dumb

jobs:
  compile-theme:
    executor: php
    steps:
      - checkout
      - load-env
      - node/install:
          node-version: << pipeline.parameters.node_version >>
      - restore_cache:
          keys: ["drupal-theme-{{ checksum \"composer.lock\" }}", "drupal-theme-"]
      - run:
          name: Composer install (also materializes gitignored .circleci/scripts)
          command: composer install
      - run:
          name: Compile theme
          command: ./.circleci/scripts/compile-theme.sh
      - save_cache:
          key: drupal-theme-{{ checksum "composer.lock" }}
          paths: ["vendor"]
      - persist_to_workspace:
          root: /tmp/workspace
          paths: ["dist"]

  cypress:
    docker:
      - image: cimg/php:<< pipeline.parameters.php_version >>-browsers
        auth: { username: $DOCKERHUB_USER, password: $DOCKERHUB_PASS }
    resource_class: large
    working_directory: ~/project
    steps:
      - ci-tools/set-variables
      - checkout
      - load-env
      - run: { name: Composer install, command: composer install }
      - ci-tools/copy-ssh-key
      - node/install:
          node-version: << pipeline.parameters.node_version >>
      - ci-tools/install-terminus
      - run:
          name: Authorize terminus
          command: terminus -n auth:login --machine-token="$TERMINUS_TOKEN"
      - run:
          name: Prime cache
          command: curl -I "${SITE_URL}"
      - run:
          name: Set Cypress variables
          command: |
            (
              echo "export CYPRESS_BASE_URL='${SITE_URL}'"
              echo "export PR_ENVIRONMENT='${TERMINUS_SITE}.pr-${CIRCLE_PULL_REQUEST##*/}'"
              echo "export CYPRESS_DRUSH_IS_PANTHEON='pr-${CIRCLE_PULL_REQUEST##*/}.${PANTHEON_UUID}'"
            ) >> "$BASH_ENV"
            source "$BASH_ENV"
      - run:
          name: Create the test user
          command: |
            terminus -n drush "$PR_ENVIRONMENT" -- user-create cypress --mail="cypress@mailinator.com" --password="cypress" || true
            terminus -n drush "$PR_ENVIRONMENT" -- user-add-role administrator cypress || true
      - run: { name: Install Cypress, command: npm ci, path: tests/cypress }
      - run:
          name: Run Tests
          command: |
            shopt -s globstar
            circleci tests glob cypress/e2e/**/*.cy.js | circleci tests split --split-by=timings > /tmp/tests-to-run
            ./node_modules/.bin/cypress run -s $(cat /tmp/tests-to-run)
          path: tests/cypress
      - run:
          when: always
          name: Generate Report
          command: npm run merge:reports
          path: tests/cypress
      - store_test_results: { path: tests/cypress/cypress/junit }
      - store_artifacts: { path: tests/cypress/cypress/ }

  deploy-to-pantheon:
    executor: buildtools
    steps:
      - checkout
      - load-env
      - ci-tools/copy-ssh-key
      - ci-tools/remove-files:
          docroot: "web"
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: setup-environment-vars
          command: /build-tools-ci/scripts/set-environment
      - run:
          name: Install dependencies (materializes gitignored .circleci/scripts)
          command: composer install --no-interaction
      - run:
          name: Composer build for Pantheon
          command: |
            composer -n build-assets
            composer run prepare-for-pantheon
      - run:
          name: Copy compiled theme assets
          command: cp -vr /tmp/workspace/dist "${THEME_PATH}/"
      - run:
          name: Deploy to Pantheon (dev / multidev)
          command: ./.circleci/scripts/pantheon/dev-multidev
          no_output_timeout: 1h

workflows:

  PHPcs:
    jobs:
      - ci-tools/composer:
          tag: << pipeline.parameters.php_version >>
          name: "PHPcs"
          context: kanopi-code
          command: "code-sniff-ci"
          post-to-github: true
          post-artifact-to-github-when: on_fail
          report-title: ":x: phpcs"
          filters: { branches: { ignore: [main] } }

  PHPstan:
    jobs:
      - ci-tools/composer:
          tag: << pipeline.parameters.php_version >>
          name: "PHPstan"
          context: kanopi-code
          command: "phpstan-ci"
          post-to-github: true
          post-artifact-to-github-when: on_fail
          report-title: ":x: phpstan"
          filters: { branches: { ignore: [main] } }

  Rector-modules:
    jobs:
      - ci-tools/composer:
          tag: << pipeline.parameters.php_version >>
          name: "Rector modules"
          context: kanopi-code
          command: "rector-modules-ci"
          post-to-github: true
          post-artifact-to-github-when: on_fail
          report-title: ":x: rector-modules"
          filters: { branches: { ignore: [main] } }

  Rector-themes:
    jobs:
      - ci-tools/composer:
          tag: << pipeline.parameters.php_version >>
          name: "Rector themes"
          context: kanopi-code
          command: "rector-themes-ci"
          post-to-github: true
          post-artifact-to-github-when: on_fail
          report-title: ":x: rector-themes"
          filters: { branches: { ignore: [main] } }

  Twig-lint:
    jobs:
      - ci-tools/composer:
          tag: << pipeline.parameters.php_version >>
          name: "Twig lint"
          context: kanopi-code
          command: "twig-lint-ci"
          post-to-github: true
          post-artifact-to-github-when: on_fail
          report-title: ":x: twig-lint"
          filters: { branches: { ignore: [main] } }

  Deployment:
    when:
      not:
        equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    jobs:
      - compile-theme:
          context: kanopi-code
      - deploy-to-pantheon:
          context: kanopi-code
          requires: [compile-theme]
          filters: { branches: { ignore: /^dependabot/ } }
      - cypress:
          # ci-tools provides the runner; tests live in tests/cypress.
          requires: [deploy-to-pantheon]
          context: kanopi-code
          pre-steps:
            - gate: { enabled: << pipeline.parameters.run_cypress >> }
            - ci-tools/set-pantheon-url
          filters: { branches: { ignore: [main] } }
          post-steps:
            - ci-tools/post-artifact-to-github:
                when: on_fail
                body-prefix: ":x: Cypress"
                body-title: "Failing Cypress Run"
                search-for: "results/mocha-report/mochawesome.html"
            - ci-tools/post-artifact-to-github:
                when: on_success
                body-prefix: ":white_check_mark: Cypress"
                body-title: "Passing Cypress Run"
                search-for: "results/mocha-report/mochawesome.html"
      - ci-tools/lighthouse:
          requires: [deploy-to-pantheon]
          context: kanopi-code
          pre-steps:
            - gate: { enabled: << pipeline.parameters.run_lighthouse >> }
            - ci-tools/set-pantheon-url: { store-as: LIGHTHOUSE_URL }
          url: "${LIGHTHOUSE_URL}"
          post-steps:
            - ci-tools/post-to-github-commit: { body: '@$(ls /opt/reports/*/comment.txt)', when: always }
          filters: { branches: { ignore: [main] } }
      - ci-tools/pa11y:
          requires: [deploy-to-pantheon]
          context: kanopi-code
          urls: "${PR_ENV_URL}"
          pre-steps:
            - gate: { enabled: << pipeline.parameters.run_pa11y >> }
            - ci-tools/set-pantheon-url: { store-as: PR_ENV_URL }
          post-steps:
            - ci-tools/post-to-github-commit: { body: '@/tmp/pa11y-ci-results.txt', when: on_fail }
          filters: { branches: { ignore: [main] } }
      - ci-tools/sdtt:
          requires: [deploy-to-pantheon]
          context: kanopi-code
          url: "${PR_ENV_URL}"
          pre-steps:
            - gate: { enabled: << pipeline.parameters.run_sdtt >> }
            - ci-tools/set-pantheon-url: { store-as: PR_ENV_URL }
          post-steps:
            - ci-tools/post-artifact-to-github:
                body-prefix: "Click here to view the report:"
                body-title: ":x: Structured Data Testing Tool failure"
                search-for: tmp/sdtt-results.txt
                when: on_fail
          filters: { branches: { ignore: [main] } }
      - ci-tools/backstopjs:
          requires: [deploy-to-pantheon]
          context: kanopi-code
          advanced-config: true
          search-find: 'TEST_URL'
          search-replace: '${TEST_URL}'
          pre-steps:
            - gate: { enabled: << pipeline.parameters.run_backstop >> }
            - ci-tools/set-pantheon-url: { store-as: TEST_URL }
            - ci-tools/set-pantheon-url: { site-env: "dev", store-as: REFERENCE_URL }
          post-steps:
            - ci-tools/post-artifact-to-github:
                body-prefix: ":x: There was a failure. Click here to view the report:"
                body-title: BackstopJS
                search-for: html_report/index.html
                when: on_fail
          filters: { branches: { ignore: main } }

  automated-updates:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - equal: ["automatic updates", << pipeline.schedule.name >>]
    jobs:
      - cms-updates/run-update:
          cms: drupal
          docroot: web
          site-env: dev
          site-hosting: pantheon
          site-id: "${TERMINUS_SITE}"
          update-method: composer
          context: kanopi-code
          php-version: << pipeline.parameters.php_version >>
          pre-steps: [load-env]

  run_cron:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - matches: { pattern: "^cron job.*", value: << pipeline.schedule.name >> }
    jobs:
      - ci-tools/terminus-job:
          context: kanopi-code
          name: "Run Cron"
          site-id: "${TERMINUS_SITE}"
          site-env: << pipeline.parameters.cron_env >>
          command: drush
          arguments: core:cron
          pre-steps: [load-env]
